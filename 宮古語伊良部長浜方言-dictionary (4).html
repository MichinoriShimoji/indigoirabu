<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>長浜方言簡易語彙集</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; background: linear-gradient(135deg, #3949ab 0%, #1a237e 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 950px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 30px; text-align: center; }
        header h1 { font-size: 28px; margin-bottom: 8px; }
        header p { opacity: 0.8; font-size: 14px; }
        /* ── ヒーロービジュアル（写真＋地図） ── */
        .hero { display: flex; height: 320px; overflow: hidden; background: #0d1117; }
        .hero-photo {
            position: relative; flex: 1 1 55%;
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 32px 28px; text-align: center;
        }
        .hero-photo::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(160deg, rgba(13,17,35,0.55) 0%, rgba(26,35,100,0.45) 100%);
        }
        .hero-photo-content { position: relative; z-index: 1; }
        .hero-photo h1 { font-size: 2.4rem; font-weight: 800; color: #fff; margin-bottom: 8px; letter-spacing: 0.04em; text-shadow: 0 2px 12px rgba(0,0,0,0.6); line-height: 1.2; }
        .hero-photo p { font-size: 13px; color: rgba(255,255,255,0.82); letter-spacing: 0.08em; text-shadow: 0 1px 6px rgba(0,0,0,0.5); }
        .hero-divider { width: 3px; background: rgba(255,255,255,0.08); flex-shrink: 0; }
        .hero-map { flex: 1 1 45%; position: relative; overflow: hidden; }
        .hero-map iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: block; }
        .hero-map-label {
            position: absolute; bottom: 12px; left: 12px; z-index: 2;
            background: rgba(13,17,35,0.72); color: rgba(255,255,255,0.9);
            font-size: 11px; padding: 4px 10px; border-radius: 20px;
            letter-spacing: 0.05em; backdrop-filter: blur(4px);
        }
        /* 写真のみ（地図なし）→ フル幅ヘッダー */
        .hero.photo-only { height: 260px; }
        .hero.photo-only .hero-photo { flex: 1 1 100%; }
        .hero.photo-only .hero-photo h1 { font-size: 2.8rem; }
        /* 地図のみ（写真なし）→ header(gradient) + 地図フル幅 */
        .hero.map-only { height: 240px; }
        .hero.map-only .hero-map { flex: 1 1 100%; }
        .map-only-header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 30px; text-align: center; }
        .map-only-header h1 { font-size: 28px; margin-bottom: 8px; }
        .map-only-header p { opacity: 0.8; font-size: 14px; }
        /* ── /ヒーロービジュアル ── */
        .search-section { padding: 20px 30px; background: #f8f9fa; border-bottom: 1px solid #e9ecef; }

        #searchInput { width: 100%; padding: 12px 16px; border: 2px solid #dee2e6; border-radius: 8px; font-size: 16px; margin-bottom: 10px; }
        #searchInput:focus { outline: none; border-color: #3949ab; }
        .search-options { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; align-items: center; }
        .search-options label { font-size: 12px; color: #6c757d; margin-right: 5px; }
        .search-targets { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .search-target { font-size: 11px; padding: 3px 8px; background: #e9ecef; border-radius: 3px; cursor: pointer; }
        .search-target:hover { background: #dee2e6; }
        .search-target.active { background: #28a745; color: white; }
        .alphabet-nav { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .nav-block { display: flex; flex-wrap: wrap; gap: 4px; padding: 10px; background: #f8f9fa; border-radius: 8px; align-items: center; }
        .nav-block.latin { border-left: 4px solid #3949ab; }
        .nav-block.kana { border-left: 4px solid #28a745; }
        .nav-block-label { font-size: 11px; color: #6c757d; margin-right: 8px; font-weight: bold; white-space: nowrap; }
        .alphabet-nav button { padding: 6px 10px; border: none; background: #e9ecef; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .alphabet-nav button:hover { background: #3949ab; color: white; }
        .alphabet-nav button.active { background: #1a237e; color: white; }
        .nav-block.kana button:hover { background: #28a745; color: white; }
        .nav-block.kana button.active { background: #1b5e20; color: white; }
        .filter-section { display: flex; flex-wrap: wrap; gap: 8px; }
        .filter-btn { padding: 6px 12px; border: none; background: #e9ecef; border-radius: 20px; cursor: pointer; font-size: 12px; }
        .filter-btn:hover { background: #dee2e6; }
        .filter-btn.active { background: #3949ab; color: white; }
        .stats { padding: 10px 30px; background: #fff3cd; font-size: 13px; color: #856404; }
        .dictionary-list { overflow-y: auto; max-height: 60vh; padding: 12px 16px; background: #f0f2f8; }
        .entry { padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; background: #ffffff; border: 1px solid #e3e6f0; border-left: 4px solid #3949ab; transition: box-shadow 0.15s, border-left-color 0.15s; }
        .entry:hover { box-shadow: 0 3px 12px rgba(57,73,171,0.12); border-left-color: #1a237e; background: #fafbff; }
        .entry-header { display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }
        .entry-header-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .morph { font-size: 26px; font-weight: bold; color: #1a1a2e; line-height: 1.2; }
        .morph-index { font-size: 13px; color: #6c757d; vertical-align: super; }
        .pos-badge { padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .entry-header-forms { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; min-height: 0; }
        .phoneme { font-size: 15px; color: #6c757d; font-family: 'Consolas', 'Monaco', monospace; }
        .ipa { font-size: 15px; color: #3949ab; font-family: 'Doulos SIL', 'Charis SIL', 'Gentium Plus', 'Noto Sans', sans-serif; line-height: 1.6; }
        .gloss-main { font-size: 17px; color: #2d3436; margin-top: 2px; }
        .allomorphs { font-size: 13px; color: #6c757d; margin: 8px 0; padding: 6px 10px; background: #f8f9fa; border-radius: 4px; border-left: 3px solid #856404; }
        .allomorphs::before { content: "異形態: "; font-weight: bold; color: #856404; }
        .allomorph-item { display: inline-block; background: #e9ecef; padding: 2px 8px; border-radius: 3px; margin: 2px 3px 2px 0; font-family: monospace; font-size: 14px; }
        .allomorph-link { cursor: pointer; background: #d4edda; border: 1px solid #28a745; color: #155724; }
        .allomorph-link:hover { background: #c3e6cb; }
        .examples-section { margin-top: 12px; padding-top: 12px; border-top: 1px dashed #dee2e6; }
        .examples-title { font-size: 12px; font-weight: bold; color: #6c757d; margin-bottom: 8px; }
        .example { margin-bottom: 12px; padding: 10px; background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%); border-radius: 8px; font-size: 13px; }
        .example-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .play-btn { width: 32px; height: 32px; border: none; border-radius: 50%; background: linear-gradient(135deg, #3949ab 0%, #1a237e 100%); color: white; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
        .play-btn:hover { transform: scale(1.1); box-shadow: 0 3px 10px rgba(102,126,234,0.4); }
        .play-btn.playing { background: #e74c3c; }
        .speaker-tag { font-size: 12px; font-weight: bold; color: #6c757d; background: #e9ecef; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; }
        .example-text { font-size: 14px; color: #1a1a2e; line-height: 1.5; font-weight: 500; flex: 1; }
        .example-trans { font-size: 13px; color: #2d3436; margin-bottom: 8px; padding: 6px 10px; background: #fff; border-radius: 4px; border-left: 3px solid #3949ab; }
        .example-trans::before { content: "訳: "; font-weight: bold; color: #3949ab; }
        .interlinear { display: flex; flex-wrap: wrap; gap: 2px; font-family: 'Consolas', 'Monaco', monospace; padding-top: 8px; border-top: 1px solid #dee2e6; }
        .gloss-unit { display: flex; flex-direction: column; align-items: center; padding: 3px 5px; margin-right: 4px; border-radius: 3px; background: #fff; }
        .gloss-unit.target { background: #fff3cd; border: 2px solid #ffc107; }
        .gloss-unit .morph-text { font-size: 13px; color: #1a1a2e; font-weight: 500; }
        .gloss-unit .gloss-text { font-size: 10px; color: #6c757d; }
        .gloss-unit.target .morph-text { color: #856404; font-weight: bold; }
        .gloss-unit.target .gloss-text { color: #856404; }
        .pos-V { background: #cce5ff; color: #004085; } .pos-N { background: #d4edda; color: #155724; } .pos-AUX { background: #fff3cd; color: #856404; } .pos-ADJ { background: #f8d7da; color: #721c24; } .pos-ADV { background: #e2d5f1; color: #5a2d82; } .pos-PRN { background: #d1ecf1; color: #0c5460; } .pos-CONJ { background: #d4edda; color: #155724; } .pos-CP { background: #ffeaa7; color: #856404; } .pos-ISP { background: #dfe6e9; color: #2d3436; } .pos-SFP { background: #fab1a0; color: #6c3d00; } .pos-INTJ { background: #fd79a8; color: #6c1e3d; } .pos-VAFX { background: #74b9ff; color: #003366; } .pos-NAFX { background: #a29bfe; color: #2d1f5c; } .pos-FN { background: #81ecec; color: #006266; } .pos-PN { background: #ffeaa7; color: #6c5000; } .pos-NUM { background: #fdcb6e; color: #5a4000; } .pos-CJP { background: #00cec9; color: #006266; } .pos-LP { background: #a8e6cf; color: #1b5e20; } .pos-CLF { background: #b2bec3; color: #2d3436; } .pos-default { background: #e9ecef; color: #495057; }
        .no-results { padding: 40px; text-align: center; color: #6c757d; }
        footer { padding: 15px 30px; background: #f8f9fa; text-align: center; font-size: 12px; color: #6c757d; }
        .highlight { background: #fff3cd; padding: 0 2px; border-radius: 2px; }
        .csv-btn { padding: 8px 16px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; margin-left: 10px; }
        .csv-btn:hover { background: #218838; }
    </style>
</head>

// 音声を再生
async function playAudio(url, startTime, endTime, btn) {
    const audio = document.getElementById('mainAudio');
    
    // LaTeXスタイルのUTFエスケープを変換
    // 例: UTF{0268} → ɨ
    url = url.replace(/\UTF{([0-9A-Fa-f]+)}/g, (match, hex) => {
        return String.fromCodePoint(parseInt(hex, 16));
    });
    
    // 既に再生中の場合は停止
    if (currentlyPlaying && currentlyPlaying.button === btn && !audio.paused) {
        audio.pause();
        btn.classList.remove('playing');
        btn.textContent = '▶';
        currentlyPlaying = null;
        return;
    }
    
    // 前の再生を停止
    if (currentlyPlaying) {
        audio.pause();
        if (currentlyPlaying.button) {
            currentlyPlaying.button.classList.remove('playing');
            currentlyPlaying.button.textContent = '▶';
        }
    }
    
    btn.classList.add('playing');
    btn.textContent = '⏳';
    
    // ファイル全体を再生するか、範囲再生するかを判定
    const playFullFile = (!startTime && !endTime) || (startTime === 0 && endTime === 0);
    
    // 再生終了チェック（範囲再生の場合のみ）
    const checkEnd = () => {
        if (!playFullFile && audio.currentTime >= endTime) {
            audio.pause();
            btn.classList.remove('playing');
            btn.textContent = '▶';
            currentlyPlaying = null;
        } else if (currentlyPlaying && currentlyPlaying.button === btn && !audio.paused) {
            requestAnimationFrame(checkEnd);
        }
    };
    
    // 再生終了イベント（ファイル全体再生の場合）
    const onEnded = () => {
        btn.classList.remove('playing');
        btn.textContent = '▶';
        currentlyPlaying = null;
        audio.removeEventListener('ended', onEnded);
    };
    
    // 再生開始
    const startPlay = async (finalUrl) => {
        audio.pause();
        audio.currentTime = 0;
        audio.src = finalUrl;
        
        if (playFullFile) {
            audio.addEventListener('ended', onEnded);
        }
        
        try {
            await audio.play();
            if (!playFullFile) {
                audio.currentTime = startTime;
                requestAnimationFrame(checkEnd);
            }
            btn.textContent = '⏹';
            currentlyPlaying = { button: btn, endTime };
            return true;
        } catch (error) {
            console.log('Play failed:', error.name, error.message);
            audio.removeEventListener('ended', onEnded);
            return false;
        }
    };
    
    // 直接URLで試す
    if (await startPlay(url)) return;
    
    // CORSプロキシを試す
    console.log('Trying CORS proxy...');
    if (await startPlay('https://corsproxy.io/?' + encodeURIComponent(url))) return;
    
    // 別のプロキシを試す
    console.log('Trying alternative proxy...');
    if (await startPlay('https://api.allorigins.win/raw?url=' + encodeURIComponent(url))) return;
    
    // 全て失敗
    console.log('All attempts failed');
    btn.classList.remove('playing');
    btn.textContent = '❌';
}

// 検索用：境界記号を除去（headwordSetより前に定義）
function stripBoundary(text) {
    if (!text) return '';
    return text.replace(/^[=~+\-.']+/, '');
}

// phonemeからスラッシュを除去（/aanuku/ → aanuku）
function stripPhonemeSlash(phoneme) {
    if (!phoneme) return '';
    return phoneme.replace(/^\/+/, '').replace(/\/+$/, '');
}

// 文字がラテン文字かどうかを判定
function isLatin(char) {
    return /[a-zA-Z]/.test(char);
}

// 文字が仮名かどうかを判定
function isKana(char) {
    return /[ぁ-んァ-ン]/.test(char);
}

// ソートキーを取得（phonemeがあればphoneme、なければmorph）
function getSortKey(item) {
    const phoneme = stripPhonemeSlash(item.phoneme);
    return (phoneme || stripBoundary(item.morph)).toLowerCase();
}

// ナビゲーション用のキーを取得（ラテン文字は先頭文字、仮名は五十音行）
function getNavKey(item) {
    const sortKey = getSortKey(item);
    const firstChar = sortKey.charAt(0);
    if (isLatin(firstChar)) {
        return { type: 'latin', key: firstChar.toLowerCase() };
    } else if (isKana(firstChar)) {
        return { type: 'kana', key: getGojuonRow(sortKey) };
    } else {
        return { type: 'other', key: firstChar.toLowerCase() };
    }
}

// ソート用の比較キーを取得
function getCompareSortKey(item) {
    const sortKey = getSortKey(item);
    const firstChar = sortKey.charAt(0);
    if (isKana(firstChar)) {
        // 仮名は五十音順でソート（ラテン文字より後に配置）
        return 'zzz' + getGojuonSortKey(sortKey);
    }
    return sortKey;
}

// 境界記号を保持しつつ正規化（シングルクォート、ピリオド、カンマを除去）
function normalizeMorph(text) {
    if (!text) return '';
    return text.replace(/^'+/, '').replace(/[.,]/g, '').toLowerCase();
}

function getSortedData() {
    return [...dictionaryData].sort((a, b) => getCompareSortKey(a).localeCompare(getCompareSortKey(b), 'ja') || (a.pos || '').localeCompare(b.pos || ''));
}

function matchSearch(text, query, mode) {
    if (!text || !query) return false;
    const t = text.toLowerCase();
    const q = query.toLowerCase();
    switch(mode) {
        case 'exact': return t === q;
        case 'prefix': return t.startsWith(q);
        case 'suffix': return t.endsWith(q);
        default: return t.includes(q);
    }
}

// 形態素検索用：境界記号を除去して検索
function matchMorphSearch(text, query, mode) {
    if (!text || !query) return false;
    const t = stripBoundary(text).toLowerCase();
    const q = query.toLowerCase();
    switch(mode) {
        case 'exact': return t === q;
        case 'prefix': return t.startsWith(q);
        case 'suffix': return t.endsWith(q);
        default: return t.includes(q);
    }
}

function filterData() {
    return getSortedData().filter(item => {
        if (currentLetter) { 
            const morphFirst = stripBoundary(item.morph).charAt(0);
            if (currentNavType === 'latin') {
                if (isLatin(morphFirst)) {
                    if (morphFirst.toLowerCase() !== currentLetter.toLowerCase()) return false;
                } else {
                    const phoneme = stripPhonemeSlash(item.phoneme);
                    if (!phoneme || phoneme.charAt(0).toLowerCase() !== currentLetter.toLowerCase()) return false;
                }
            } else if (currentNavType === 'kana') {
                if (!isKana(morphFirst)) return false;
                if (toHiragana(morphFirst) !== currentLetter) return false;
            }
        }
        if (currentFilter && item.pos !== currentFilter) return false;
        if (searchQuery) {
            let match = false;
            // morphまたはphonemeで検索
            if (searchTargets.morph) {
                if (matchMorphSearch(item.morph, searchQuery, searchMode)) match = true;
                // phonemeでも検索（スラッシュ除去）
                if (!match && item.phoneme) {
                    const phoneme = stripPhonemeSlash(item.phoneme);
                    if (matchSearch(phoneme, searchQuery, searchMode)) match = true;
                }
            }
            if (!match && searchTargets.gloss && matchSearch(item.gloss, searchQuery, searchMode)) match = true;
            if (!match && searchTargets.pos && matchSearch(item.pos, searchQuery, searchMode)) match = true;
            if (!match && searchTargets.allo && item.allomorphs?.some(a => matchMorphSearch(a, searchQuery, searchMode))) match = true;
            if (!match && searchTargets.trans && item.examples?.some(ex => matchSearch(ex.trans, searchQuery, searchMode))) match = true;
            if (!match) return false;
        }
        return true;
    });
}

    nav.appendChild(allBlock);
    
    const latinLetters = new Set();
    const morphLatinLetters = new Set();
    const kanaChars = new Set();
    
    for (const d of dictionaryData) {
        const morphFirst = stripBoundary(d.morph).charAt(0);
        
        if (isLatin(morphFirst)) {
            morphLatinLetters.add(morphFirst.toLowerCase());
        } else if (isKana(morphFirst)) {
            kanaChars.add(toHiragana(morphFirst));
            const phoneme = stripPhonemeSlash(d.phoneme);
            if (phoneme && isLatin(phoneme.charAt(0))) {
                latinLetters.add(phoneme.charAt(0).toLowerCase());
            }
        }
    }
    
    const allLatinLetters = new Set([...latinLetters, ...morphLatinLetters]);
        
        // アルファベットブロック
        if (allLatinLetters.size > 0) {
            const latinBlock = document.createElement('div');
            latinBlock.className = 'nav-block latin';
            const latinLabel = document.createElement('div');
            latinLabel.className = 'nav-block-label';
            latinLabel.textContent = '🔤 アルファベット（A-Z）';
            latinBlock.appendChild(latinLabel);
            
            [...allLatinLetters].sort().forEach(letter => {
                const btn = document.createElement('button');
                btn.textContent = letter.toUpperCase();
                btn.onclick = () => { currentLetter = letter; currentNavType = 'latin'; nav.querySelectorAll('button').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render(); };
                latinBlock.appendChild(btn);
            });
            nav.appendChild(latinBlock);
        }
        
        // 仮名ブロック
        if (kanaChars.size > 0) {
            const kanaBlock = document.createElement('div');
            kanaBlock.className = 'nav-block kana';
            const kanaLabel = document.createElement('div');
            kanaLabel.className = 'nav-block-label';
            kanaLabel.textContent = '📝 見出し語（五十音）';
            kanaBlock.appendChild(kanaLabel);
            
            const kanaOrder = 'あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをん';
            [...kanaChars].sort((a, b) => kanaOrder.indexOf(a) - kanaOrder.indexOf(b)).forEach(kana => {
                const btn = document.createElement('button');
                btn.textContent = kana;
                btn.onclick = () => { currentLetter = kana; currentNavType = 'kana'; nav.querySelectorAll('button').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render(); };
                kanaBlock.appendChild(btn);
            });
            nav.appendChild(kanaBlock);
        }
}

// カタカナをひらがなに変換
function toHiragana(char) {
    const code = char.charCodeAt(0);
    if (code >= 0x30A1 && code <= 0x30F6) {
        return String.fromCharCode(code - 0x60);
    }
    return char;
}

function initPosFilters() {
    const allPos = new Set(dictionaryData.map(d => d.pos).filter(Boolean)), filters = document.getElementById('posFilters'); filters.innerHTML = '';
    const allBtn = document.createElement('button'); allBtn.className = 'filter-btn active'; allBtn.textContent = '全品詞';
    allBtn.onclick = () => { currentFilter = null; filters.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); allBtn.classList.add('active'); render(); };
    filters.appendChild(allBtn);
    ['V','N','ADJ','ADV','AUX','PRN','CP','ISP','SFP','INTJ','CONJ','VAFX','NAFX','FN','PN','CJP','LP'].forEach(pos => { if (allPos.has(pos)) { const btn = document.createElement('button'); btn.className = 'filter-btn'; btn.textContent = pos; btn.onclick = () => { currentFilter = pos; filters.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render(); }; filters.appendChild(btn); } });
}

document.getElementById('searchInput').oninput = (e) => { searchQuery = e.target.value; render(); };

// 検索対象切替
document.querySelectorAll('.search-target').forEach(function(tgt) {
    tgt.onclick = function() {
        tgt.classList.toggle('active');
        searchTargets[tgt.dataset.target] = tgt.classList.contains('active');
        if (searchQuery) render();
    };
});

document.getElementById('totalCount').textContent = dictionaryData.length;
initAlphabetNav(); initPosFilters(); render();

function downloadCSV() {
    const escapeCSV = (str) => {
        if (!str) return '';
        str = String(str);
        // Excelで数式として解釈される記号で始まる場合、先頭にシングルクォートを付ける
        if (/^[=+-@]/.test(str)) {
            str = "'" + str;
        }
        if (str.includes(',') || str.includes('"') || str.includes('\n')) {
            return '"' + str.replace(/"/g, '""') + '"';
        }
        return str;
    };
    
    // ヘッダー
    const headers = ['morph', 'phoneme', 'ipa', 'pos', 'gloss', 'allomorphs', 'morph_index', 'ex_text', 'ex_trans', 'ex_morphs', 'ex_glosses', 'ex_audio', 'ex_start', 'ex_end', 'ex_target', 'ex_speaker'];
    let csv = headers.join(',') + '\n';
    
    for (const entry of dictionaryData) {
        const base = [
            escapeCSV(entry.morph),
            escapeCSV(entry.phoneme || ''),
            escapeCSV(entry.ipa || ''),
            escapeCSV(entry.pos),
            escapeCSV(entry.gloss),
            escapeCSV((entry.allomorphs || []).join('|')),
            escapeCSV(entry.morph_index || '')
        ];
        
        if (entry.examples && entry.examples.length > 0) {
            for (const ex of entry.examples) {
                const row = [
                    ...base,
                    escapeCSV(ex.text),
                    escapeCSV(ex.trans),
                    escapeCSV((ex.morphs || []).join('|')),
                    escapeCSV((ex.glosses || []).join('|')),
                    escapeCSV(ex.audio_file),
                    escapeCSV(ex.start_time),
                    escapeCSV(ex.end_time),
                    ex.target_index !== undefined ? String(ex.target_index) : '',
                    escapeCSV(ex.speaker || '')
                ];
                csv += row.join(',') + '\n';
            }
        } else {
            csv += base.join(',') + ',,,,,,,,,' + '\n';
        }
    }
    
    const bom = '\uFEFF';
    const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'dictionary.csv';
    a.click();
    URL.revokeObjectURL(url);
}
